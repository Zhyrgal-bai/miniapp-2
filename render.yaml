# Blueprint Render: Web + PostgreSQL.
# New → Blueprint → подключите репозиторий → применить файл.
# После деплоя добавьте секреты бота (BOT_TOKENS и т.д.) в Environment.
databases:
  - name: miniapp-db
    databaseName: miniapp
    user: miniapp
    plan: free

services:
  - type: web
    name: miniapp-store
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    # Миграции и запуск: scripts/productionStart.mjs (migrate deploy + node dist/server/index.js)
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: DATABASE_URL
        fromDatabase:
          name: miniapp-db
          property: connectionString
      # Если задать API_URL вручную — имеет приоритет над RENDER_EXTERNAL_URL
      - key: API_URL
        sync: false
