# Blueprint Render: Web + PostgreSQL.
# New → Blueprint → подключите репозиторий → применить файл.
# После деплоя добавьте секреты бота (BOT_TOKENS и т.д.) в Environment.
databases:
  - name: miniapp-db
    databaseName: miniapp
    user: miniapp
    plan: free

services:
  - type: web
    name: miniapp-store
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    # Миграции и запуск: scripts/productionStart.mjs (migrate deploy + node dist/server/index.js)
    startCommand: npm start
    healthCheckPath: /ready
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: DATABASE_URL
        fromDatabase:
          name: miniapp-db
          property: connectionString
      # Публичный URL API (без /). На Render обычно = https://<service>.onrender.com
      - key: API_URL
        sync: false
      # Опционально: переопределить URL для Vite (иначе build берёт RENDER_EXTERNAL_URL)
      - key: VITE_API_URL
        sync: false
      # Заполните в Dashboard после первого деплоя:
      # - BOT_TOKEN или BOT_TOKENS (бот регистрации / платформы; первый токен — проверка Mini App initData)
      # - PLATFORM_WEBAPP_BOT_TOKEN — если Mini App открывается не с того бота что первый в BOT_TOKENS
      # - MINI_APP_URL и/или FRONT_URL — HTTPS URL Mini App для кнопок бота (тот же хост, что API, если SPA на Render)
      #   Пример: https://miniapp-2-qipd.onrender.com
      - key: MINI_APP_URL
        sync: false
      # - ADMIN_IDS / PLATFORM_ADMIN_TELEGRAM_ID — по необходимости
      # - TELEGRAM_WEBHOOK_SECRET (production): тот же secret_token в setWebhook + заголовок X-Telegram-Bot-Api-Secret-Token
      # - BOT_TOKEN_SECRET_KEY (production): AES-256 шифрование Business.botToken в БД (≥32 символа)
      # Multi-bot Mini App: перебор токенов магазинов в БД для проверки initData (по умолчанию вкл. в коде; =0 откл.)
      - key: WEBAPP_VALIDATE_INITDATA_SCAN_STORE_BOTS
        value: "1"
      # Verbose initData logs — enable only while debugging auth (never in production).
      # - key: TELEGRAM_INIT_DEBUG
      #   value: "1"
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
      - key: BOT_TOKEN_SECRET_KEY
        sync: false
      - key: TELEGRAM_WEBHOOK_MAX_RPS_PER_IP
        sync: false
      - key: FINIK_WEBHOOK_SIGNATURE_HEADER
        value: "x-finik-signature"
      # Official Finik Acquiring test account (platform only; optional — see finikKeys.ts):
      # - key: FINIK_PRIVATE_KEY
      #   sync: false
      # - key: FINIK_PUBLIC_KEY
      #   sync: false
      # - key: FINIK_API_KEY
      #   sync: false
      # - key: FINIK_ACCOUNT_ID
      #   sync: false
      - key: OPERATOR_PASSWORD_HASH
        sync: false
      - key: FRONT_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
