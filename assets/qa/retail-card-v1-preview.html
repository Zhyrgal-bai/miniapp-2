<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Retail Card V1 — viewport QA</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; margin: 0; padding: 16px; background: #111; color: #eee; }
    h1 { font-size: 1rem; margin: 0 0 12px; }
    .row { display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 24px; }
    .frame { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; overflow: hidden; }
    .frame__label { font-size: 11px; padding: 6px 8px; background: #222; color: #aaa; }
    .frame__inner { padding: 8px; }
    .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .grid--3 { grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; }
    /* Minimal retail card mock matching V1 proportions */
    .mock-card { display: flex; flex-direction: column; height: 100%; }
    .mock-media { aspect-ratio: 4/5; background: #333; border-radius: 12px; flex: 7 1 0; }
    .mock-meta { min-height: 52px; padding: 8px 2px 4px; flex: 2 1 auto; }
    .mock-title { font-size: 12px; line-height: 1.25; height: 2.5em; overflow: hidden; margin: 0 0 4px; }
    .mock-price { font-size: 13px; font-weight: 700; }
    .mock-cta { min-height: 44px; border-radius: 999px; background: #444; margin-top: 2px; display: flex; align-items: center; justify-content: center; font-size: 12px; }
  </style>
</head>
<body>
  <h1>Retail Product Card V1 — layout stability QA</h1>
  <p style="font-size:13px;color:#888;margin:0 0 20px">Verify: equal card heights, 44px CTA, no clipped title/price at listed widths.</p>

  <div class="row">
    <div class="frame" style="width:320px">
      <div class="frame__label">320px · 2 col</div>
      <div class="frame__inner"><div class="grid" id="g320"></div></div>
    </div>
    <div class="frame" style="width:360px">
      <div class="frame__label">360px · 2 col</div>
      <div class="frame__inner"><div class="grid" id="g360"></div></div>
    </div>
    <div class="frame" style="width:390px">
      <div class="frame__label">390px · 2 col</div>
      <div class="frame__inner"><div class="grid" id="g390"></div></div>
    </div>
    <div class="frame" style="width:430px">
      <div class="frame__label">430px · 2 col</div>
      <div class="frame__inner"><div class="grid" id="g430"></div></div>
    </div>
    <div class="frame" style="width:768px">
      <div class="frame__label">768px · 3 col</div>
      <div class="frame__inner"><div class="grid grid--3" id="g768"></div></div>
    </div>
    <div class="frame" style="width:1024px">
      <div class="frame__label">1024px · 4 col</div>
      <div class="frame__inner"><div class="grid grid--3" style="grid-template-columns:repeat(4,1fr)" id="g1024"></div></div>
    </div>
  </div>
  <script>
    const products = [
      { name: "Капучино", price: "180 сом" },
      { name: "Букет «Весна» с длинным названием для проверки переноса", price: "1990 сом" },
      { name: "Футболка oversize", price: "2490 сом" },
      { name: "Бургер классик", price: "250 сом" },
    ];
    function card(p) {
      return `<div class="mock-card"><div class="mock-media"></div><div class="mock-meta"><p class="mock-title">${p.name}</p><div class="mock-price">${p.price}</div></div><div class="mock-cta">Заказать</div></div>`;
    }
    for (const id of ["g320","g360","g390","g430","g768","g1024"]) {
      document.getElementById(id).innerHTML = products.map(card).join("");
    }
  </script>
</body>
</html>
